{% extends 'base.html' %}

{% block content %}
<h2>{{ t.create_user_title }}</h2>

{% if error %}
<p class="error">{{ error | e }}</p>
{% endif %}

<form method="post" action="/create_user">
    <table>
        <tr>
            <td><label for="username">{{ t.username }}:</label></td>
            <td><input type="text" id="username" name="username" required></td>
        </tr>
        <tr>
            <td><label for="password">{{ t.password }}:</label></td>
            <td><input type="password" id="password" name="password" required></td>
        </tr>
        <tr>
            <td><label for="password2">{{ t.confirm_password }}:</label></td>
            <td><input type="password" id="password2" name="password2" required></td>
        </tr>
        <tr>
            <td><label for="age">{{ t.age_optional }}:</label></td>
            <td><input type="number" id="age" name="age" min="1" max="150"></td>
        </tr>
        <tr>
            <td></td>
            <td><input type="submit" value="{{ t.create_account }}"></td>
        </tr>
    </table>
</form>

<p>{{ t.have_account }} <a href="/login">{{ t.login_here }}</a></p>
{% endblock %}
