{% extends 'base.html' %}

{% block content %}
<h2>Change Password</h2>

{% if error %}
<p class="error">{{ error | e }}</p>
{% endif %}

{% if success %}
<p class="success">{{ success | e }}</p>
{% endif %}

<form method="post" action="/change_password">
    <table>
        <tr>
            <td><label for="old_password">Old Password:</label></td>
            <td><input type="password" id="old_password" name="old_password" required></td>
        </tr>
        <tr>
            <td><label for="new_password">New Password:</label></td>
            <td><input type="password" id="new_password" name="new_password" required></td>
        </tr>
        <tr>
            <td><label for="new_password2">Confirm New Password:</label></td>
            <td><input type="password" id="new_password2" name="new_password2" required></td>
        </tr>
        <tr>
            <td></td>
            <td><input type="submit" value="Change Password"></td>
        </tr>
    </table>
</form>
{% endblock %}
