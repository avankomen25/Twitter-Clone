{% extends 'base.html' %}

{% block content %}
<h2>{{ t.post_title }}</h2>

{% if error %}
<p class="error">{{ error | e }}</p>
{% endif %}

<form method="post" action="/create_message">
    <table>
        <tr>
            <td><label for="message">{{ t.message }}:</label></td>
            <td><textarea id="message" name="message" rows="4" cols="50" required></textarea></td>
        </tr>
        <tr>
            <td></td>
            <td><input type="submit" value="{{ t.post }}"></td>
        </tr>
    </table>
</form>
{% endblock %}
